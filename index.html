<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chúc mừng 8/3 - Dải ngân hà tình yêu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at bottom, #1d2731 0%, #0a0c10 100%);
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        /* Stars background */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Background floating text */
        .background-text {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.1;
            overflow: hidden;
        }

        .text-item {
            position: absolute;
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
            white-space: nowrap;
            animation: galaxyFloat 15s linear infinite;
            text-shadow: 0 0 15px rgba(255,215,0,0.5);
            transform-origin: center;
        }

        @keyframes galaxyFloat {
            0% {
                transform: translate(100%, 100%) rotate(0deg) scale(0);
                opacity: 0;
            }
            20% {
                opacity: 1;
                transform: translate(0%, 0%) rotate(180deg) scale(1);
            }
            80% {
                opacity: 1;
                transform: translate(-100%, -100%) rotate(360deg) scale(0.5);
            }
            100% {
                transform: translate(-200%, -200%) rotate(540deg) scale(0);
                opacity: 0;
            }
        }

        /* Galaxy effect container */
        .galaxy-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            display: none;
        }

        .galaxy-container.active {
            display: block;
        }

        .galaxy-photo {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid rgba(255, 215, 0, 0.5);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            object-fit: cover;
            animation: galaxySpin 3s ease-out forwards;
            pointer-events: none;
            opacity: 0;
        }

        @keyframes galaxySpin {
            0% {
                opacity: 1;
                transform: translate(var(--startX), var(--startY)) rotate(0deg) scale(0.3);
            }
            50% {
                transform: translate(calc(var(--midX) * 1px), calc(var(--midY) * 1px)) rotate(720deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(calc(var(--endX) * 1px), calc(var(--endY) * 1px)) rotate(1440deg) scale(1.5);
                opacity: 0;
            }
        }

        /* Main photo with galaxy effect */
        .main-photo-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto;
            filter: drop-shadow(0 0 50px rgba(255,215,0,0.5));
        }

        .main-photo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid gold;
            object-fit: cover;
            animation: rotateGalaxy 20s linear infinite;
            box-shadow: 0 0 50px rgba(255,215,0,0.3);
        }

        @keyframes rotateGalaxy {
            from { transform: rotate(0deg) scale(1); }
            to { transform: rotate(360deg) scale(1); }
        }

        .orbit-ring {
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            border: 2px dashed rgba(255,215,0,0.3);
            border-radius: 50%;
            animation: orbit 15s linear infinite;
        }

        .orbit-ring:nth-child(2) {
            top: -40px;
            left: -40px;
            right: -40px;
            bottom: -40px;
            animation-direction: reverse;
            animation-duration: 20s;
        }

        @keyframes orbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Floating hearts and flowers */
        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .float-element {
            position: absolute;
            color: rgba(255, 182, 193, 0.8);
            font-size: 20px;
            animation: galaxyRise 6s ease-in infinite;
            text-shadow: 0 0 15px rgba(255,0,0,0.5);
        }

        @keyframes galaxyRise {
            0% {
                transform: translateY(100%) rotate(0deg) scale(0);
                opacity: 0;
            }
            20% {
                opacity: 1;
                transform: translateY(80%) rotate(180deg) scale(1);
            }
            100% {
                transform: translateY(-20%) rotate(720deg) scale(0);
                opacity: 0;
            }
        }

        /* Gift section */
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .gift-section {
            text-align: center;
            transition: opacity 0.5s ease;
            position: relative;
            z-index: 10;
        }

        .gift-box {
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 0 30px rgba(255,215,0,0.3));
        }

        .gift-box:hover {
            transform: scale(1.05) rotate(5deg);
        }

        .box-lid {
            width: 100%;
            height: 40px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            position: relative;
            border-radius: 10px 10px 0 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transform-origin: top;
            transition: transform 0.5s ease;
            border: 2px solid #fff;
            border-bottom: none;
        }

        .box-body {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, #ff5252, #ff7676);
            border-radius: 0 0 10px 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            position: relative;
            border: 2px solid #fff;
            border-top: none;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .box-body::before {
            content: "⭐";
            font-size: 50px;
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            text-shadow: 0 0 20px gold;
            animation: starPulse 1s infinite;
        }

        @keyframes starPulse {
            0%, 100% { transform: translateX(-50%) scale(1); opacity: 1; }
            50% { transform: translateX(-50%) scale(1.2); opacity: 0.8; }
        }

        .open-btn {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255,107,107,0.4);
            transition: all 0.3s ease;
            border: 2px solid rgba(255,255,255,0.5);
            font-weight: bold;
            letter-spacing: 1px;
        }

        .open-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255,215,0,0.6);
        }

        /* Photo section */
        .photo-section {
            text-align: center;
            opacity: 0;
            transition: opacity 1s ease;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .wish-text {
            color: white;
            text-shadow: 0 0 10px rgba(255,215,0,0.8),
                         0 0 20px rgba(255,182,193,0.8),
                         0 0 30px rgba(255,105,180,0.8);
            font-size: 28px;
            font-weight: bold;
            line-height: 1.4;
            margin-top: 40px;
            animation: galaxyGlow 2s ease-in-out infinite;
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255,215,0,0.3);
        }

        @keyframes galaxyGlow {
            0%, 100% {
                text-shadow: 0 0 10px gold, 0 0 20px #ff6b6b, 0 0 30px #ff8e8e;
            }
            50% {
                text-shadow: 0 0 20px gold, 0 0 30px #ff6b6b, 0 0 40px #ff8e8e;
            }
        }

        /* Click effect */
        .click-effect {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            animation: galaxyPop 0.8s ease-out forwards;
        }

        @keyframes galaxyPop {
            0% {
                transform: scale(0) rotate(0deg);
                opacity: 1;
            }
            50% {
                transform: scale(2) rotate(180deg);
                opacity: 0.8;
            }
            100% {
                transform: scale(3) rotate(360deg);
                opacity: 0;
            }
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .gift-box {
                width: 150px;
                height: 150px;
            }
            
            .main-photo-container {
                width: 250px;
                height: 250px;
            }
            
            .wish-text {
                font-size: 22px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Stars background -->
    <div class="stars" id="stars"></div>
    
    <!-- Background text -->
    <div class="background-text" id="backgroundText"></div>
    
    <!-- Galaxy effect container -->
    <div class="galaxy-container" id="galaxyContainer"></div>
    
    <!-- Floating elements -->
    <div class="floating-elements" id="floatingElements"></div>

    <!-- Main container -->
    <div class="container">
        <!-- Gift section -->
        <div class="gift-section" id="giftSection">
            <div class="gift-box" id="giftBox" onclick="openGift()">
                <div class="box-lid" id="giftLid">
                    <div style="position:absolute; width:100%; height:100%; background: linear-gradient(135deg, #ffd700, #ffa500); border-radius:10px 10px 0 0;"></div>
                </div>
                <div class="box-body">
                    <div style="position:absolute; width:40px; height:100%; background:#ffd700; left:50%; transform:translateX(-50%);"></div>
                    <div style="position:absolute; width:100%; height:40px; background:#ffd700; top:50%; transform:translateY(-50%);"></div>
                    <div class="gift-message" style="color:white; font-size:24px; position:relative; z-index:6;">✨</div>
                </div>
            </div>
            <button class="open-btn" onclick="openGift()">Mở món quà</button>
        </div>

        <!-- Photo section -->
        <div class="photo-section hidden" id="photoSection">
            <div class="main-photo-container">
                <div class="orbit-ring"></div>
                <div class="orbit-ring"></div>
                <!-- Dễ dàng thay đổi ảnh người nhận -->
                <img class="main-photo" src="https://via.placeholder.com/300x300/ff6b6b/ffffff?text=Ảnh+của+em" alt="Người nhận" id="recipientPhoto">
            </div>
            <!-- Dễ dàng thay đổi lời chúc -->
            <div class="wish-text" id="wishText">
                Chúc em một ngày 8/3 thật vui vẻ,<br>
                luôn xinh đẹp, hạnh phúc và gặp nhiều<br>
                may mắn trong cuộc sống.
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const CONFIG = {
            backgroundTexts: [
                "Happy Women's Day", "Chúc em luôn vui vẻ", "8/3", 
                "Always smile", "Stay happy", "Love", "🌟", "💫", "✨"
            ],
            wishMessage: "Chúc em một ngày 8/3 thật vui vẻ, luôn xinh đẹp, hạnh phúc và gặp nhiều may mắn trong cuộc sống.",
            photoUrl: "https://via.placeholder.com/300x300/ff6b6b/ffffff?text=Ảnh+của+em"
        };

        // Update content
        document.getElementById('wishText').innerHTML = CONFIG.wishMessage.replace(/\n/g, '<br>');

        // Create stars
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = (1 + Math.random() * 3) + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }

        // Create background text
        function createBackgroundText() {
            const container = document.getElementById('backgroundText');
            for (let i = 0; i < 30; i++) {
                const text = document.createElement('div');
                text.className = 'text-item';
                text.style.left = Math.random() * 100 + '%';
                text.style.top = Math.random() * 100 + '%';
                text.style.animationDelay = Math.random() * 15 + 's';
                text.style.animationDuration = (10 + Math.random() * 10) + 's';
                text.textContent = CONFIG.backgroundTexts[Math.floor(Math.random() * CONFIG.backgroundTexts.length)];
                container.appendChild(text);
            }
        }

        // Galaxy effect function
        function createGalaxyEffect() {
            const galaxyContainer = document.getElementById('galaxyContainer');
            galaxyContainer.classList.add('active');
            
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            // Tạo 24 ảnh xoay quanh tâm
            for (let i = 0; i < 24; i++) {
                setTimeout(() => {
                    const photo = document.createElement('img');
                    photo.className = 'galaxy-photo';
                    
                    // Random ảnh (có thể thay bằng ảnh thật)
                    const images = [
                        'https://via.placeholder.com/100/ff6b6b/ffffff?text=🌸',
                        'https://via.placeholder.com/100/ff8e8e/ffffff?text=❤️',
                        'https://via.placeholder.com/100/ffa07a/ffffff?text=✨',
                        'https://via.placeholder.com/100/ffb6c1/ffffff?text=💫'
                    ];
                    photo.src = images[Math.floor(Math.random() * images.length)];
                    
                    // Tính toán vị trí bắt đầu (random từ các góc)
                    const angle = (i / 24) * Math.PI * 2;
                    const radius = Math.min(window.innerWidth, window.innerHeight) * 0.8;
                    
                    const startX = centerX + Math.cos(angle) * radius;
                    const startY = centerY + Math.sin(angle) * radius;
                    
                    // Vị trí kết thúc (tâm)
                    const endX = centerX - 50;
                    const endY = centerY - 50;
                    
                    // Vị trí giữa (xoáy)
                    const midX = centerX + Math.cos(angle + Math.PI/2) * (radius * 0.3);
                    const midY = centerY + Math.sin(angle + Math.PI/2) * (radius * 0.3);
                    
                    photo.style.setProperty('--startX', startX + 'px');
                    photo.style.setProperty('--startY', startY + 'px');
                    photo.style.setProperty('--midX', midX);
                    photo.style.setProperty('--midY', midY);
                    photo.style.setProperty('--endX', endX);
                    photo.style.setProperty('--endY', endY);
                    
                    photo.style.left = '0px';
                    photo.style.top = '0px';
                    
                    galaxyContainer.appendChild(photo);
                    
                    setTimeout(() => {
                        photo.remove();
                    }, 3000);
                }, i * 100); // Mỗi ảnh cách nhau 100ms
            }
            
            setTimeout(() => {
                galaxyContainer.classList.remove('active');
            }, 4000);
        }

        // Floating hearts and flowers
        function createFloatingElements() {
            const container = document.getElementById('floatingElements');
            setInterval(() => {
                if (!document.getElementById('photoSection').classList.contains('hidden')) {
                    const element = document.createElement('div');
                    element.className = 'float-element';
                    element.style.left = Math.random() * 100 + '%';
                    element.style.animationDuration = (4 + Math.random() * 4) + 's';
                    element.style.fontSize = (15 + Math.random() * 25) + 'px';
                    
                    const symbols = ['❤️', '🌸', '🌺', '💝', '💖', '💗', '✨', '⭐'];
                    element.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
                    
                    container.appendChild(element);
                    
                    setTimeout(() => {
                        element.remove();
                    }, 5000);
                }
            }, 300);
        }

        // Click effect
        document.addEventListener('click', function(e) {
            if (!document.getElementById('photoSection').classList.contains('hidden')) {
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        const effect = document.createElement('div');
                        effect.className = 'click-effect';
                        effect.style.left = (e.pageX - 20 + (Math.random() * 40 - 20)) + 'px';
                        effect.style.top = (e.pageY - 20 + (Math.random() * 40 - 20)) + 'px';
                        effect.style.fontSize = (20 + Math.random() * 30) + 'px';
                        
                        const effects = ['❤️', '🎆', '✨', '⭐', '💫', '🌠'];
                        effect.innerHTML = effects[Math.floor(Math.random() * effects.length)];
                        
                        document.body.appendChild(effect);
                        
                        setTimeout(() => {
                            effect.remove();
                        }, 800);
                    }, i * 100);
                }
            }
        });

        // Open gift function
        function openGift() {
            const giftSection = document.getElementById('giftSection');
            const photoSection = document.getElementById('photoSection');
            const giftLid = document.getElementById('giftLid');
            
            // Animate lid
            giftLid.style.transform = 'rotateX(110deg)';
            
            // Create galaxy effect
            createGalaxyEffect();
            
            setTimeout(() => {
                giftSection.style.opacity = '0';
                setTimeout(() => {
                    giftSection.classList.add('hidden');
                    photoSection.classList.remove('hidden');
                    photoSection.style.opacity = '1';
                    
                    // Start floating elements
                    createFloatingElements();
                }, 500);
            }, 1500);
        }

        // 3D Tilt effect
        const photoContainer = document.querySelector('.main-photo-container');
        
        document.addEventListener('mousemove', function(e) {
            if (!document.getElementById('photoSection').classList.contains('hidden')) {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 30;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 30;
                photoContainer.style.transform = `perspective(1000px) rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            }
        });

        // Parallax effect
        document.addEventListener('mousemove', function(e) {
            if (!document.getElementById('photoSection').classList.contains('hidden')) {
                const x = e.clientX / window.innerWidth;
                const y = e.clientY / window.innerHeight;
                
                const stars = document.getElementById('stars');
                stars.style.transform = `translate(${x * 30}px, ${y * 30}px)`;
            }
        });

        // Touch support
        document.addEventListener('touchmove', function(e) {
            if (!document.getElementById('photoSection').classList.contains('hidden') && e.touches.length > 0) {
                const touch = e.touches[0];
                const xAxis = (window.innerWidth / 2 - touch.clientX) / 30;
                const yAxis = (window.innerHeight / 2 - touch.clientY) / 30;
                photoContainer.style.transform = `perspective(1000px) rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
                
                const x = touch.clientX / window.innerWidth;
                const y = touch.clientY / window.innerHeight;
                const stars = document.getElementById('stars');
                stars.style.transform = `translate(${x * 30}px, ${y * 30}px)`;
            }
        });

        // Initialize
        createStars();
        createBackgroundText();
    </script>
</body>
</html>
